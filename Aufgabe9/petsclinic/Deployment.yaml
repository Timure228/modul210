kind: Deployment
apiVersion: apps/v1
metadata:
  name: php-my-admin
  labels:
    app: php-my-admin
    app.kubernetes.io/part-of: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php-my-admin
  template:
    metadata:
      labels:
        app: php-my-admin
    spec:
      containers:
        - name: php-my-admin
          image: lukeelten/openshift-phpmyadmin
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PMA_HOST
              value: mysql
            - name: PMA_PORT
              value: '3306'
            - name: PMA_USER
              valueFrom:
                secretKeyRef:
                  name: mysql
                  key: database-user
            - name: PMA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql
                  key: database-password
          resources:
            limits:
              cpu: '2'
              memory: 200Mi
            requests:
              cpu: '1'
              memory: 100Mi
          imagePullPolicy: Always
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
