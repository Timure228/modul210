---
kind: Secret
apiVersion: v1
metadata:
  name: MY-APP-secret                  # ÄNDERN: my-app-secret
  labels:
    app: MY-APP                        # ÄNDERN: my-app
    app.kubernetes.io/part-of: MY-APP  # ÄNDERN: my-app
# Werte mit: echo -n "deinwert" | base64
data:
  database-host: bXktYXBwLWRhdGFiYXNl  # my-app-database  (= Service-Name der DB!)
  database-name: ENCODE_ME             # echo -n "dbname" | base64
  database-password: ENCODE_ME         # echo -n "password" | base64
  database-user: ENCODE_ME             # echo -n "username" | base64
  database-root-password: ENCODE_ME    # echo -n "rootpassword" | base64
type: Opaque
